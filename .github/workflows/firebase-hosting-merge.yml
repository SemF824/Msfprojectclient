name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main

# LE BLOC CRUCIAL (Pas de commentaires PR ici, mais validation de statut requise)
permissions:
  checks: write
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer les dependances
        run: npm install

      - name: Build du projet immobilier
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploiement sur Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MSF_CONGO }}
          channelId: live
          projectId: msf-congo